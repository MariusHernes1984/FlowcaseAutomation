services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  # Cosmos DB Linux emulator — uncomment once you want persistent storage
